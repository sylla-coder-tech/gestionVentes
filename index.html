<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion Ventes</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header class="appHeader">
  <button class="iconBtn" id="btnMenu">☰</button>
  <div class="appTitle">
    <div class="brand">SalesBoard</div>
    <div class="subtitle" id="headerSubtitle">Dashboard</div>
  </div>
  <button class="iconBtn" id="btnRefresh">⟳</button>
</header>

<main class="appMain">

  <!-- DASHBOARD -->
  <section id="view-dashboard" class="view">
    <div class="gridKpi">
      <div class="kpiCard">
        <div class="kpiLabel">Total ventes (prix d’achat)</div>
        <div class="kpiValue" id="kpiRevenue">0 GNF</div>
      </div>

      <div class="kpiCard">
        <div class="kpiLabel">Ventes totales</div>
        <div class="kpiValue" id="kpiSalesCount">0</div>
      </div>

      <div class="kpiCard">
        <div class="kpiLabel">Caisse totale</div>
        <div class="kpiValue" id="kpiProfit">0 GNF</div>
      </div>
    </div>

    <div class="card">
      <h2>Dernières ventes</h2>
      <div class="tableWrap">
        <table class="proTable">
          <thead>
            <tr>
              <th>Produit</th>
              <th>Client</th>
              <th>Tél</th>
              <th>Adresse</th>
              <th>Prix stock</th>
              <th>Prix d’achat</th>
              <th>Livraison</th>
              <th>Caisse</th>
              <th>Statut</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="dashSalesBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- VENTES -->
  <section id="view-ventes" class="view hidden">
    <div class="card">
      <h2>Ventes</h2>
      <div class="tableWrap">
        <table class="proTable">
          <thead>
            <tr>
              <th>Produit</th>
              <th>Client</th>
              <th>Tél</th>
              <th>Adresse</th>
              <th>Prix stock</th>
              <th>Prix d’achat</th>
              <th>Livraison</th>
              <th>Caisse</th>
              <th>Bénéfice</th>
              <th>Statut</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="salesBody"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app.js"></script>
</body>
</html>
